[pytest]
# The default run is the fast unit suite; the browser-level e2e suite
# (tools/tests/e2e/) is opt-in:
#   uv run --with pytest --with fastapi --with uvicorn --with playwright \
#     --with mlx-whisper pytest tools/tests -m e2e -v
# (a -m on the command line overrides this addopts default)
addopts = -m "not e2e"
markers =
    e2e: browser-level end-to-end tests (Playwright + a real server on an ephemeral port); excluded by default
